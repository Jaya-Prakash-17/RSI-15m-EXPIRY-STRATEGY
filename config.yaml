backtest:
  start_date: '2026-01-01'
  end_date: '2026-03-20'
capital:
  initial: 100000
data:
  download_retry_count: 3
  storage_path: data
indices:
  BANKNIFTY:
    expiry_day: Tuesday  # Monthly last Tuesday (from Sep 2025)
    lot_size: 30
    tick_size: 0.05
  NIFTY:
    expiry_day: Tuesday  # Current expiry day (code handles historical Thursday → Tuesday change)
    lot_size: 65
    tick_size: 0.05
  SENSEX:
    expiry_day: Thursday
    lot_size: 20
    tick_size: 0.05
risk:
  max_loss_per_day: 5000
strategy:
  alert_validity: 1  # Candles allowed for price to break alert_high (after alert candle)
  exit_mode: single_lot #single_lot or multi_lot
  lots_per_trade: 3
  single_lot_exit_target: 3  # 1=T1, 2=T2, 3=T3 — used in single_lot exit mode
  rsi:
    period: 11 # RSI(14) — standard Wilder RSI, matches strategy design
    threshold: 60
    warmup_periods: 81 # CANDLE COUNT (not multiplied by rsi_period). 100x15min = ~3 trading days
    min_candles_for_signal: 27   # rsi_period × 3 — minimum before any alert fires
  trade_only_on_expiry: false  # false:trade on every day, true:trade only on expiry day
  rsi_debug: false   # set true only when validating RSI values against Groww chart
  safe_sl_mode: false # If true, caps SL distance to max loss limit below
  safe_sl_max_loss: 5000 # Max ₹ loss per trade position (total across all lots)
  min_sl_pct: 0.08   # 8% of trigger price floor for stop loss
  signal_window_start: '10:00' # No new alerts before this time
  signal_window_end: '13:30'   # No new alerts after this time
  direction_filter_enabled: false # CE only on bullish spot, PE only on bearish spot
  trailing_stop:
    enabled: true
    move_by_alert_range: true
trading:
  paper_trading: true  # Set to false for REAL trading with actual money
  trade_log_file: "logs/PAPER_TRADES_LOG.csv"  # Separate file for trade audit trail
  window:
    auto_square_off: '15:25'
    end: '15:00'
    start: '10:15'
